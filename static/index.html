</div><!-- /app -->

<script>
function simulator() {
  function skill(name, type, rate, dmgRate, dmgType, target, healRate, healTarget, status) {
    return {
      name: name || '',
      skill_type: type || '主动',
      activation_rate: rate ?? 0.35,
      damage_rate: dmgRate ?? 0,
      damage_type: dmgType || '兵刃',
      target_mode: target || 'single_enemy',
      heal_rate: healRate ?? 0,
      heal_target: healTarget || 'self',
      apply_status: status || '',
    };
  }

  function general(name, force, intel, command, speed, troops, type, grade, skills) {
    return {
      name, troops, troop_type: type, troop_grade: grade, skills,
      innate_skill_name: '',
      innate_skill_desc: '',
      level: 1, faction: '',
      db_id: null, dirty: false, editing: false,
      red_dots: 0, is_collection: false, command_value: 5,
      main_book: null, sub_book1: null, sub_book2: null,
      free_force: 0, free_intel: 0, free_command: 0, free_speed: 0, free_politics: 0, free_charisma: 0,
      affinities: { cavalry: 'C', bow: 'C', spear: 'C', shield: 'C', machine: 'C' },
      force:           +parseFloat(force).toFixed(2),
      intel:           +parseFloat(intel).toFixed(2),
      command:         +parseFloat(command).toFixed(2),
      speed:           +parseFloat(speed).toFixed(2),
      politics:        0,
      charisma:        0,
      force_base:      +parseFloat(force).toFixed(2),
      intel_base:      +parseFloat(intel).toFixed(2),
      command_base:    +parseFloat(command).toFixed(2),
      speed_base:      +parseFloat(speed).toFixed(2),
      politics_base:   0,
      charisma_base:   0,
      force_growth:    0,
      intel_growth:    0,
      command_growth:  0,
      speed_growth:    0,
      politics_growth: 0,
      charisma_growth: 0,
    };
  }

  function defaultTech() {
    return {
      // 军事
      tech_attack: 10, tech_intel: 10, tech_defense: 10, jiugong: 0, bagua: 0,
      // 兵战（满级）
      bingzhan_wu: 10, bingzhan_mou: 10, bingzhan_fang: 10, bingzhan_su: 10,
      // 协力（满级）
      xieli_wei: 10, xieli_shu: 10, xieli_wu: 10, xieli_han: 10, xieli_qun: 10,
      // 军营（满级）
      jingying: 20,
      // 兵营（满级）
      camp_shield: 10, camp_cavalry: 10, camp_bow: 10, camp_spear: 10, camp_machine: 10,
    };
  }

  return {
    teams: {
      a: [
        general('关羽', 97, 75, 96, 74, 10000, 'cavalry', 'S', [
          skill('武圣', '主动', 0.35, 1.8, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('横刀立马', '被动', 0.35, 0, '兵刃', 'self', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
        ]),
        general('张飞', 97, 52, 88, 71, 10000, 'spear', 'A', [
          skill('万夫不当', '主动', 0.35, 1.6, '兵刃', 'all_enemy', 0, 'self', '震慑'),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
        ]),
        general('诸葛亮', 36, 100, 91, 72, 10000, 'bow', 'S', [
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
        ]),
      ],
      b: [
        general('吕布', 100, 67, 84, 95, 10000, 'cavalry', 'S', [
          skill('辕门射戟', '主动', 0.35, 2.0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('无双之势', '突击', 0.35, 1.5, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
        ]),
        general('张辽', 91, 72, 96, 83, 10000, 'spear', 'A', [
          skill('大军突击', '主动', 0.35, 1.6, '兵刃', 'all_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
        ]),
        general('貂蝉', 25, 95, 52, 89, 10000, 'bow', 'A', [
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
          skill('', '主动', 0.35, 0, '兵刃', 'single_enemy', 0, 'self', ''),
        ]),
      ],
    },
    tech: { a: defaultTech(), b: defaultTech() },
    advisor: { a: null, b: null },
    teamTroop: { a: '', b: '' },
    bonus: { a: { affinity: false, faction: false }, b: { affinity: false, faction: false } },
    skillsData: [],
    skillPicker: { open: false, team: null, idx: null, slot: null, category: '全部', expandedId: null, search: '' },
    bookPicker: { open: false, team: null, idx: null, stage: 'system', selectedSystem: null },
    booksData: [],
    advisorSkills: [],
    advisorSearch: { a: '', b: '' },
    advisorOpen: { a: false, b: false },
    generalsData: [],
    affinitiesData: [],
    genSearch: { a: ['','',''], b: ['','',''] },
    genOpen:   { a: [false,false,false], b: [false,false,false] },
    levelOptions: Array.from({length:50}, (_,i)=>i+1),
    batchRuns: 100,
    loading: false,
    runs: 1,
    result: null,
    error: null,
    showLog: false,
    // ── 认证 ──
    authToken: localStorage.getItem('sgz_token') || '',
    currentUser: null,
    authModal: { open: false, mode: 'login' },
    authForm: { username:'', email:'', password:'', server_name:'', alliance_name:'' },
    authError: '',
    // ── 装备 ──
    equipPanel: { open: false },
    equipForm: { open:false, id:null, data:{name:'',eq_type:'武器',owner_general:'',force_bonus:0,intel_bonus:0,command_bonus:0,speed_bonus:0,politics_bonus:0,charisma_bonus:0,skill1:'',skill2:''}, error:'' },
    equipList: [],
    equipSearch: '',
    equipTypeFilter: '全部',
    equipSort: '',

    userId: '',
    savedLineups: Array(5).fill(null),
    lineupName: '',
    savedLineupsB: Array(5).fill(null),
    lineupNameB: '',
    activeLineupSlot: { a: null, b: null },
    loadedSnapshot: { a: null, b: null },
    pendingSlot: { a: null, b: null },

    async init() {
      try {
        const [advRes, genRes, skillRes, affRes, bookRes] = await Promise.all([
          fetch('/api/advisor_skills'),
          fetch('/api/generals'),
          fetch('/api/skills'),
          fetch('/api/affinities'),
          fetch('/api/military_books'),
        ]);
        this.advisorSkills  = await advRes.json();
        this.generalsData   = await genRes.json();
        this.skillsData     = await skillRes.json();
        this.affinitiesData = await affRes.json();
        this.booksData      = await bookRes.json();
      } catch(e) {
        this.advisorSkills = [];
        this.generalsData  = [];
        this.skillsData    = [];
      }
      // 检查 URL 中是否有重置密码 token
      const urlParams = new URLSearchParams(window.location.search);
      const resetToken = urlParams.get('reset_token');
      if (resetToken) {
        this.authForm._resetToken = resetToken;
        this.authModal.mode = 'reset';
        this.authModal.open = true;
        window.history.replaceState({}, '', '/');
      }
      // 恢复登录状态
      if (this.authToken) {
        try {
          const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + this.authToken } });
          if (r.ok) this.currentUser = await r.json();
          else { this.authToken = ''; localStorage.removeItem('sgz_token'); }
        } catch(e) {}
      }
      // 初始化用户ID（持久化到 localStorage）
      let uid = localStorage.getItem('sgz_uid');
      if (!uid) {
        uid = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('sgz_uid', uid);
      }
      this.userId = this.currentUser ? ('u' + this.currentUser.id) : uid;
      // 从数据库载入阵容
      try {
        const lRes = await fetch(`/api/lineups/${this.userId}`);
        if (lRes.ok) {
          const ld = await lRes.json();
          this.savedLineups  = (ld.a || Array(5).fill(null)).map(s => s ? {...s, ...s.data} : null);
          this.savedLineupsB = (ld.b || Array(5).fill(null)).map(s => s ? {...s, ...s.data} : null);
        }
      } catch(e) {}

      // 用数据库数据填充默认将领，并设满级默认值
      const defaults = {
        a: ['关羽', '张飞', '诸葛亮'],
        b: ['吕布', '张辽', '貂蝉'],
      };
      for (const team of ['a', 'b']) {
        defaults[team].forEach((name, idx) => {
          const found = this.generalsData.find(g => g.name === name);
          if (found) {
            this.pickGeneral(team, idx, found);
            const g = this.teams[team][idx];
            g.level = 50;
            g.red_dots = 5;
            g.is_collection = true;
            this.recalcStats(team, idx);
          }
        });
      }
    },

    filteredGenerals(team, idx) {
      const q = (this.genSearch[team][idx] || '').trim().toLowerCase();
      if (!q) return this.generalsData;
      return this.generalsData.filter(g => g.name.toLowerCase().includes(q));
    },

    freeTotal(g) {
      return 10 + (g.red_dots||0)*10 + (g.is_collection ? 10 : 0) + Math.floor((g.level||1)/10)*10;
    },
    freeUsed(g) {
      return (g.free_force||0)+(g.free_intel||0)+(g.free_command||0)+(g.free_speed||0)+(g.free_politics||0)+(g.free_charisma||0);
    },
    freeLeft(g) {
      return this.freeTotal(g) - this.freeUsed(g);
    },
    capFree(g, stat) {
      const left = this.freeLeft(g);
      if (left < 0) g[stat] = Math.max(0, g[stat] + left);
      if (g[stat] < 0) g[stat] = 0;
    },
    resetGeneral(team, idx) {
      const g = this.teams[team][idx];
      // 只清自由属性点，等级不变
      g.free_force = g.free_intel = g.free_command = g.free_speed = g.free_politics = g.free_charisma = 0;
      // 按当前等级重算属性
      this.recalcStats(team, idx);
      g.dirty = false;
    },

    teamCommandTotal(team) {
      return this.teams[team].reduce((sum, g) => sum + (g.command_value || 5), 0);
    },

    openSkillPicker(team, idx, slot) {
      if (this.skillPicker.open && this.skillPicker.team===team && this.skillPicker.idx===idx && this.skillPicker.slot===slot) {
        this.skillPicker.open = false;
      } else {
        this.skillPicker = { open: true, team, idx, slot, category: '全部', expandedId: null, search: '' };
      }
    },
    selectSkill(sk) {
      const g = this.teams[this.skillPicker.team][this.skillPicker.idx];
      const slot = this.skillPicker.slot;
      g.skills[slot] = {
        name: sk.name,
        skill_type: sk.category || '主动',
        activation_rate: +(sk.trigger_prob || 0.35),
        damage_rate: 0, damage_type: '兵刃',
        target_mode: sk.target === '敌军全体' ? 'all_enemy' : sk.target === '自身' ? 'self' : 'single_enemy',
        heal_rate: 0, heal_target: 'self', apply_status: '',
      };
      this.skillPicker.open = false;
    },
    skillDesc(name) {
      if (!name) return '';
      const sk = this.skillsData.find(s => s.name === name);
      return sk ? (sk.description || sk.effect || '') : '';
    },
    getBaseName(name) {
      return (name || '').replace(/^SP /, '').trim();
    },
    triggeredAffinities(team) {
      const names = this.teams[team].map(g => g.name).filter(n => n);
      if (names.length === 0) return [];
      return this.affinitiesData.filter(aff => {
        // 按基础名字分组
        const groups = {};
        for (const m of (aff.members || [])) {
          const base = this.getBaseName(m);
          if (!groups[base]) groups[base] = true;
        }
        // 统计队伍里命中几个组
        let matched = 0;
        for (const base of Object.keys(groups)) {
          if (names.some(n => this.getBaseName(n) === base)) matched++;
        }
        return matched >= aff.min_members;
      });
    },
    calcTroops(jingying, level) {
      // 军营1-10级：每级+200；11-20级：每级+300；满级=5000
      const j = jingying || 0;
      const campBonus = j <= 10 ? j * 200 : 2000 + (j - 10) * 300;
      // 武将每级+100，Lv50=5000
      const lvBonus = (level || 1) * 100;
      return campBonus + lvBonus;
    },
    techMax(side, sec) {
      const t = this.tech[side];
      const maxMap = {
        bingzhan: { bingzhan_wu:10, bingzhan_mou:10, bingzhan_fang:10, bingzhan_su:10 },
        xieli:    { xieli_wei:10, xieli_shu:10, xieli_wu:10, xieli_han:10, xieli_qun:10 },
        camp:     { camp_shield:10, camp_cavalry:10, camp_bow:10, camp_spear:10, camp_machine:10 },
        jingying: { jingying:20 },
        guard:    { jiugong:5, bagua:5 },
      };
      Object.assign(t, maxMap[sec]);
    },
    techReset(side, sec) {
      const t = this.tech[side];
      const keys = {
        bingzhan: ['bingzhan_wu','bingzhan_mou','bingzhan_fang','bingzhan_su'],
        xieli:    ['xieli_wei','xieli_shu','xieli_wu','xieli_han','xieli_qun'],
        camp:     ['camp_shield','camp_cavalry','camp_bow','camp_spear','camp_machine'],
        jingying: ['jingying'],
        guard:    ['jiugong','bagua'],
      };
      keys[sec].forEach(k => t[k] = 0);
    },
    filteredSkills() {
      const cat = this.skillPicker.category;
      const q = (this.skillPicker.search || '').trim();
      let list = cat === '全部' ? this.skillsData : this.skillsData.filter(s => s.category === cat);
      if (q) list = list.filter(s => s.name.includes(q) || (s.effect || '').includes(q));
      return list;
    },

    // ── 兵书 ──
    bookSystems() {
      return [...new Set(this.booksData.map(b => b.book_system))];
    },
    booksForStage() {
      const sys = this.bookPicker.selectedSystem;
      const type = this.bookPicker.stage === 'main' ? '主兵书' : '副兵书';
      let list = this.booksData.filter(b => b.book_type === type);
      if (sys) list = list.filter(b => b.book_system === sys);
      return list;
    },
    getBookSystem(g) {
      if (g.main_book) {
        const b = this.booksData.find(b => b.name === g.main_book);
        return b ? b.book_system : '';
      }
      return '';
    },
    openBookPicker(team, idx) {
      if (this.bookPicker.open && this.bookPicker.team === team && this.bookPicker.idx === idx) {
        this.bookPicker.open = false; return;
      }
      const keepSystem = this.bookPicker.team === team && this.bookPicker.idx === idx ? this.bookPicker.selectedSystem : null;
      this.bookPicker = { open: true, team, idx, stage: 'system', selectedSystem: keepSystem };
    },
    selectMainBook(team, idx, bk) {
      this.teams[team][idx].main_book = bk.name;
      this.teams[team][idx].sub_book1 = null;
      this.teams[team][idx].sub_book2 = null;
      this.bookPicker.stage = 'sub';
    },
    selectSubBook(team, idx, bk) {
      const g = this.teams[team][idx];
      if (g.sub_book1 === bk.name || g.sub_book2 === bk.name) return;
      if (!g.sub_book1) { g.sub_book1 = bk.name; }
      else if (!g.sub_book2) { g.sub_book2 = bk.name; this.bookPicker.open = false; }
    },
    bookDesc(name) {
      if (!name) return '';
      const b = this.booksData.find(b => b.name === name);
      return b ? b.description : '';
    },

    // 阵营加成：三将同阵营（魏/蜀/吴/群/汉）
    factionBonus(team) {
      const factions = this.teams[team].map(g => g.faction).filter(f => f);
      return factions.length === 3 && factions.every(f => f === factions[0]);
    },

    // 兵种加成：选定兵种 且 对应兵营科技等级>0 则自动激活
    troopBonus(team) {
      const type = this.teamTroop[team];
      if (!type) return false;
      const campKey = { cavalry:'camp_cavalry', bow:'camp_bow', spear:'camp_spear', shield:'camp_shield', machine:'camp_machine' };
      return (this.tech[team][campKey[type]] || 0) > 0;
    },

    lockTeamTroop(team) {
      const type = this.teamTroop[team];
      if (!type) return;
      this.teams[team].forEach(g => {
        g.troop_type  = type;
        g.troop_grade = g.affinities[type] || 'C';
      });
    },

    affinityList(g) {
      const order = ['cavalry', 'bow', 'spear', 'shield', 'machine'];
      const names = { cavalry:'骑兵', bow:'弓兵', spear:'枪兵', shield:'盾兵', machine:'器械' };
      const aff = g.affinities || {};
      return order.map(t => ({ type: t, name: names[t], grade: aff[t] || 'C' }));
    },

    // ── 阵容快照（用于脏检测）──
    snapshotLineup(team) {
      return JSON.stringify({
        troop: this.teamTroop[team],
        adv: this.advisor[team]?.id || null,
        gens: this.teams[team].map(g => ({
          n: g.name, lv: g.level,
          rd: g.red_dots||0, col: g.is_collection||false,
          tg: g.troop_grade||'',
          s1: g.skills[1]?.name||'', s2: g.skills[2]?.name||'',
          ff: g.free_force||0, fi: g.free_intel||0,
          fc: g.free_command||0, fs: g.free_speed||0,
        })),
      });
    },
    isLineupDirty(team) {
      if (this.activeLineupSlot[team] === null) return false;
      return this.snapshotLineup(team) !== this.loadedSnapshot[team];
    },
    _buildLineupPayload(team, name) {
      return {
        name,
        teamTroop: this.teamTroop[team],
        advisor: this.advisor[team] ? JSON.parse(JSON.stringify(this.advisor[team])) : null,
        generals: this.teams[team].map(g => ({
          name: g.name, level: g.level,
          troop_type: g.troop_type, troop_grade: g.troop_grade,
          red_dots: g.red_dots||0, is_collection: g.is_collection||false,
          skills: g.skills.map(s => ({ name: s.name||'' })),
          free_force: g.free_force||0, free_intel: g.free_intel||0,
          free_command: g.free_command||0, free_speed: g.free_speed||0,
          free_politics: g.free_politics||0, free_charisma: g.free_charisma||0,
          main_book: g.main_book||null, sub_book1: g.sub_book1||null, sub_book2: g.sub_book2||null,
        })),
        savedAt: new Date().toLocaleDateString('zh-CN'),
      };
    },
    _applyLineupToTeam(team, lineup) {
      this.teamTroop[team] = lineup.teamTroop || '';
      this.advisor[team] = lineup.advisor || null;
      if (lineup.teamTroop) this.lockTeamTroop(team);
      lineup.generals.forEach((saved, idx) => {
        if (!saved.name) return;
        const gen = this.generalsData.find(g => g.name === saved.name);
        if (!gen) return;
        this.pickGeneral(team, idx, gen);
        const g = this.teams[team][idx];
        g.level = saved.level || 1;
        g.red_dots = saved.red_dots || 0;
        g.is_collection = saved.is_collection || false;
        if (saved.skills[1]) g.skills[1].name = saved.skills[1].name || '';
        if (saved.skills[2]) g.skills[2].name = saved.skills[2].name || '';
        g.free_force = saved.free_force||0; g.free_intel = saved.free_intel||0;
        g.free_command = saved.free_command||0; g.free_speed = saved.free_speed||0;
        g.free_politics = saved.free_politics||0; g.free_charisma = saved.free_charisma||0;
        g.main_book = saved.main_book||null; g.sub_book1 = saved.sub_book1||null; g.sub_book2 = saved.sub_book2||null;
        this.recalcStats(team, idx);
      });
    },

    // ── API 工具 ──
    async _apiSave(team, slot, payload) {
      await fetch(`/api/lineups/${this.userId}/${team}/${slot}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: payload.name, data: payload }),
      });
    },
    async _apiDelete(team, slot) {
      await fetch(`/api/lineups/${this.userId}/${team}/${slot}`, { method: 'DELETE' });
    },

    // ── 我方阵容 A ──
    canSaveLineup() { return true; },
    lineupSlotsFull() {
      return this.savedLineups.every(s => s !== null);
    },
    async saveLineup() {
      if (!this.canSaveLineup()) return;
      if (this.activeLineupSlot.a !== null) {
        const slotIdx = this.activeLineupSlot.a;
        const slotName = this.savedLineups[slotIdx]?.name || ('阵容' + (slotIdx + 1));
        if (!confirm(`是否更新「${slotName}」？`)) return;
        const updated = this._buildLineupPayload('a', this.savedLineups[slotIdx].name);
        await this._apiSave('a', slotIdx, updated);
        this.savedLineups = [...this.savedLineups];
        this.savedLineups[slotIdx] = updated;
        this.loadedSnapshot.a = this.snapshotLineup('a');
        return;
      }
      const slot = this.pendingSlot.a !== null ? this.pendingSlot.a : this.savedLineups.findIndex(s => s === null);
      if (slot === -1) return;
      const lineup = this._buildLineupPayload('a', this.lineupName.trim() || ('阵容' + (slot + 1)));
      await this._apiSave('a', slot, lineup);
      this.savedLineups = [...this.savedLineups];
      this.savedLineups[slot] = lineup;
      this.lineupName = '';
      this.pendingSlot.a = null;
      this.activeLineupSlot.a = slot;
      this.loadedSnapshot.a = this.snapshotLineup('a');
    },
    async loadLineup(slot) {
      if (this.activeLineupSlot.a !== null && this.activeLineupSlot.a !== slot && this.isLineupDirty('a')) {
        const cur = this.savedLineups[this.activeLineupSlot.a]?.name || ('阵容' + (this.activeLineupSlot.a + 1));
        if (confirm(`「${cur}」已变更，是否保存更新并离开？`)) {
          const updated = this._buildLineupPayload('a', this.savedLineups[this.activeLineupSlot.a].name);
          await this._apiSave('a', this.activeLineupSlot.a, updated);
          this.savedLineups = [...this.savedLineups];
          this.savedLineups[this.activeLineupSlot.a] = updated;
        }
      }
      const lineup = this.savedLineups[slot];
      if (!lineup) return;
      this._applyLineupToTeam('a', lineup);
      this.activeLineupSlot.a = slot;
      this.pendingSlot.a = null;
      this.loadedSnapshot.a = this.snapshotLineup('a');
    },
    async deleteLineup(slot) {
      await this._apiDelete('a', slot);
      this.savedLineups = [...this.savedLineups];
      this.savedLineups[slot] = null;
      if (this.activeLineupSlot.a === slot) {
        this.activeLineupSlot.a = null;
        this.loadedSnapshot.a = null;
      }
    },

    // ── 认证方法 ──
    async doLogin() {
      this.authError = '';
      try {
        const r = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ username: this.authForm.username, password: this.authForm.password })
        });
        const d = await r.json();
        if (!r.ok) { this.authError = d.detail || '登录失败'; return; }
        this.authToken = d.token;
        localStorage.setItem('sgz_token', d.token);
        this.currentUser = d;
        this.userId = 'u' + d.user_id;
        // 重新加载该用户的阵容
        const lr = await fetch(`/api/lineups/${this.userId}`);
        if (lr.ok) {
          const ld = await lr.json();
          this.savedLineups  = (ld.a || Array(5).fill(null)).map(s => s ? {...s, ...s.data} : null);
          this.savedLineupsB = (ld.b || Array(5).fill(null)).map(s => s ? {...s, ...s.data} : null);
        }
        this.authModal.open = false;
        this.authForm = { username:'', email:'', password:'', server_name:'', alliance_name:'' };
      } catch(e) { this.authError = '网络错误'; }
    },
    async doRegister() {
      this.authError = '';
      if (!this.authForm.username || !this.authForm.email || !this.authForm.password) {
        this.authError = '请填写必填项'; return;
      }
      try {
        const r = await fetch('/api/auth/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            username: this.authForm.username, email: this.authForm.email,
            password: this.authForm.password, server_name: this.authForm.server_name,
            alliance_name: this.authForm.alliance_name
          })
        });
        const d = await r.json();
        if (!r.ok) { this.authError = d.detail || '注册失败'; return; }
        this.authToken = d.token;
        localStorage.setItem('sgz_token', d.token);
        this.currentUser = { id: d.user_id, username: d.username, email: this.authForm.email,
          server_name: this.authForm.server_name, alliance_name: this.authForm.alliance_name };
        this.userId = 'u' + d.user_id;
        this.authModal.open = false;
        this.authForm = { username:'', email:'', password:'', server_name:'', alliance_name:'' };
      } catch(e) { this.authError = '网络错误'; }
    },
    async doForgot() {
      this.authError = '';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email: this.authForm.email })
        });
        const d = await r.json();
        if (!r.ok) { this.authError = d.detail || '发送失败'; return; }
        this.authError = '✓ 如果邮箱已注册，重置链接已发送，请查收邮件';
      } catch(e) { this.authError = '网络错误'; }
    },
    async doReset() {
      this.authError = '';
      if (this.authForm.password.length < 6) { this.authError = '密码至少6位'; return; }
      try {
        const r = await fetch('/api/auth/reset-password', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ token: this.authForm._resetToken, password: this.authForm.password })
        });
        const d = await r.json();
        if (!r.ok) { this.authError = d.detail || '重置失败'; return; }
        this.authError = '✓ 密码重置成功，请登录';
        setTimeout(() => { this.authModal.mode='login'; this.authError=''; }, 1500);
      } catch(e) { this.authError = '网络错误'; }
    },
    logout() {
      this.authToken = ''; this.currentUser = null;
      localStorage.removeItem('sgz_token');
      this.savedLineups = Array(5).fill(null);
      this.savedLineupsB = Array(5).fill(null);
      const uid = localStorage.getItem('sgz_uid') || '';
      this.userId = uid;
    },

      this.equipPanel.open = true;
      await this.fetchEquip();

    async fetchEquip() {

      try {
        const r = await fetch('/api/user/equipment', { headers:{ Authorization:'Bearer '+this.authToken } });
        if (r.ok) this.equipList = await r.json();

    filteredEquip() {

      if (this.equipTypeFilter !== '全部') list = list.filter(e => e.eq_type === this.equipTypeFilter);
      if (this.equipSearch) {
        const q = this.equipSearch.toLowerCase();
        list = list.filter(e => e.name.toLowerCase().includes(q) || (e.owner_general||'').toLowerCase().includes(q));
      }
      if (this.equipSort) list.sort((a,b) => (b[this.equipSort]||0) - (a[this.equipSort]||0));

          speed_bonus:eq.speed_bonus||0, politics_bonus:eq.politics_bonus||0, charisma_bonus:eq.charisma_bonus||0,
          skill1:eq.skill1||'', skill2:eq.skill2||'' };
      } else {
        this.equipForm.id = null;
        this.equipForm.data = {name:'',eq_type:'武器',owner_general:'',force_bonus:0,intel_bonus:0,command_bonus:0,speed_bonus:0,politics_bonus:0,charisma_bonus:0,skill1:'',skill2:''};

    async saveEquip() {
      this.equipForm.error = '';
      if (!this.equipForm.data.name) { this.equipForm.error = '请输入装备名'; return; }
      const url = this.equipForm.id ? `/api/user/equipment/${this.equipForm.id}` : '/api/user/equipment';
      const method = this.equipForm.id ? 'PUT' : 'POST';
      try {
        const r = await fetch(url, {
          method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+this.authToken},
          body: JSON.stringify(this.equipForm.data)
        });
        if (!r.ok) { const d=await r.json(); this.equipForm.error=d.detail||'保存失败'; return; }
        this.equipForm.open = false;
        await this.fetchEquip();
      } catch(e) { this.equipForm.error = '网络错误'; }
    },
    async deleteEquip(id) {
      if (!confirm('确认删除这件装备？')) return;
      await fetch(`/api/user/equipment/${id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+this.authToken } });
      await this.fetchEquip();
    },

    pickGeneral(team, idx, gen) {
      const g = this.teams[team][idx];
      g.name           = gen.name;
      g.db_id          = gen.id;
      g.level          = 1;
      g.dirty          = false;
      g.editing        = false;
      g.red_dots       = 0;
      g.is_collection  = false;
      g.free_force = g.free_intel = g.free_command = g.free_speed = g.free_politics = g.free_charisma = 0;
      g.command_value  = +(gen.command_value ?? 5);
      g.faction        = gen.faction || '';
      g.innate_skill_name = gen.innate_skill || '';
      const innateObj = this.skillsData.find(s => s.name === gen.innate_skill);
      g.innate_skill_desc = innateObj ? (innateObj.description || '') : '';
      // 重置技能槽2/3 和兵书
      g.skills[1] = { name: '', skill_type: '主动', activation_rate: 0.35, damage_rate: 0, damage_type: '兵刃', target_mode: 'single_enemy', heal_rate: 0, heal_target: 'self', apply_status: '' };
      g.skills[2] = { name: '', skill_type: '主动', activation_rate: 0.35, damage_rate: 0, damage_type: '兵刃', target_mode: 'single_enemy', heal_rate: 0, heal_target: 'self', apply_status: '' };
      g.main_book = null; g.sub_book1 = null; g.sub_book2 = null;
      g.force_base     = +parseFloat(gen.strength    ?? 0).toFixed(2);
      g.intel_base     = +parseFloat(gen.intelligence?? 0).toFixed(2);
      g.command_base   = +parseFloat(gen.leadership  ?? 0).toFixed(2);
      g.speed_base     = +parseFloat(gen.speed       ?? 0).toFixed(2);
      g.politics_base  = +parseFloat(gen.politics    ?? 0).toFixed(2);
      g.charisma_base  = +parseFloat(gen.charisma    ?? 0).toFixed(2);
      g.force_growth   = +parseFloat(gen.str_growth  ?? 0).toFixed(2);
      g.intel_growth   = +parseFloat(gen.int_growth  ?? 0).toFixed(2);
      g.command_growth = +parseFloat(gen.lead_growth ?? 0).toFixed(2);
      g.speed_growth   = +parseFloat(gen.spd_growth  ?? 0).toFixed(2);
      g.politics_growth= +parseFloat(gen.pol_growth  ?? 0).toFixed(2);
      g.charisma_growth= +parseFloat(gen.cha_growth  ?? 0).toFixed(2);
      g.force    = g.force_base;
      g.intel    = g.intel_base;
      g.command  = g.command_base;
      g.speed    = g.speed_base;
      g.politics = g.politics_base;
      g.charisma = g.charisma_base;
      // 自动选最高适性兵种
      const affinities = { cavalry: gen.cavalry, bow: gen.bow, spear: gen.spear, shield: gen.shield, machine: gen.machine };
      const order = ['S','A','B','C'];
      let bestType = 'spear', bestRank = 99;
      for (const [type, grade] of Object.entries(affinities)) {
        const rank = order.indexOf(grade ?? 'C');
        if (rank < bestRank) { bestRank = rank; bestType = type; }
      }
      g.affinities  = { cavalry: gen.cavalry||'C', bow: gen.bow||'C', spear: gen.spear||'C', shield: gen.shield||'C', machine: gen.machine||'C' };
      g.troop_type  = bestType;
      g.troop_grade = affinities[bestType] || 'A';
      this.genSearch[team][idx] = '';
      this.genOpen[team][idx]   = false;
      // 自动检测阵营加成（三将同阵营则激活）
      this.bonus[team].faction = this.factionBonus(team);
    },

    recalcStats(team, idx) {
      const g = this.teams[team][idx];
      const lv = g.level - 1;
      g.force    = +( g.force_base    + g.force_growth    * lv + (g.free_force   ||0) ).toFixed(2);
      g.intel    = +( g.intel_base    + g.intel_growth    * lv + (g.free_intel   ||0) ).toFixed(2);
      g.command  = +( g.command_base  + g.command_growth  * lv + (g.free_command ||0) ).toFixed(2);
      g.speed    = +( g.speed_base    + g.speed_growth    * lv + (g.free_speed   ||0) ).toFixed(2);
      g.politics = +( g.politics_base + g.politics_growth * lv + (g.free_politics||0) ).toFixed(2);
      g.charisma = +( g.charisma_base + g.charisma_growth * lv + (g.free_charisma||0) ).toFixed(2);
    },

    // 编辑模式：手动改属性值，反推基础值
    syncBase(g, stat, newVal) {
      g[stat] = +newVal;
      const lv = g.level - 1;
      const free = g['free_' + stat] || 0;
      g[stat + '_base'] = +( newVal - free - g[stat + '_growth'] * lv ).toFixed(2);
      g.dirty = true;
    },

    // 编辑模式：改成长值时，反推基础值
    syncGrowth(g, stat) {
      const lv = g.level - 1;
      const free = g['free_' + stat] || 0;
      g[stat + '_base'] = +( g[stat] - free - g[stat + '_growth'] * lv ).toFixed(2);
      g.dirty = true;
    },

    // 非编辑模式：用新值直接计算自由点分配
    adjustFree(g, stat, newVal) {
      newVal = +newVal;
      const freeStat = 'free_' + stat;
      const lv = g.level - 1;
      const baseAtLevel = +(g[stat + '_base'] + g[stat + '_growth'] * lv).toFixed(2);
      const currentFree = g[freeStat] || 0;
      const currentStat = +(baseAtLevel + currentFree).toFixed(2);

      // 低于或等于基础值：清空自由点
      if (newVal <= baseAtLevel + 0.001) {
        g[freeStat] = 0;
        g[stat] = baseAtLevel;
        return;
      }

      const rawDelta = newVal - currentStat;
      // 无实质变化（浮点相等）
      if (Math.abs(rawDelta) < 0.001) {
        g[stat] = currentStat;
        return;
      }

      // 方向感知：小数基础值 + step=1 时，UP/DOWN 的 delta 可能不足0.5
      // UP：至少 +1 SP；DOWN：至少 -1 SP
      let freeDelta;
      if (rawDelta > 0) {
        freeDelta = Math.max(1, Math.round(rawDelta));
      } else {
        freeDelta = Math.min(-1, Math.ceil(rawDelta));
      }

      const maxFree = currentFree + this.freeLeft(g);
      g[freeStat] = Math.max(0, Math.min(currentFree + freeDelta, maxFree));
      g[stat] = +(baseAtLevel + g[freeStat]).toFixed(2);
    },

    async saveGeneral(team, idx) {
      const g = this.teams[team][idx];
      if (!g.db_id) return;
      const ok = confirm(
        `确认保存「${g.name}」的修改到数据库（Lv5 基础值）？\n\n` +
        `武力 ${g.force_base}（成长 ${g.force_growth}）\n` +
        `智力 ${g.intel_base}（成长 ${g.intel_growth}）\n` +
        `统率 ${g.command_base}（成长 ${g.command_growth}）\n` +
        `速度 ${g.speed_base}（成长 ${g.speed_growth}）\n` +
        `政治 ${g.politics_base}（成长 ${g.politics_growth}）\n` +
        `魅力 ${g.charisma_base}（成长 ${g.charisma_growth}）`
      );
      if (!ok) return;
      try {
        const res = await fetch(`/api/generals/${g.db_id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            strength:     g.force_base,
            intelligence: g.intel_base,
            leadership:   g.command_base,
            speed:        g.speed_base,
            politics:     g.politics_base,
            charisma:     g.charisma_base,
            str_growth:   g.force_growth,
            int_growth:   g.intel_growth,
            lead_growth:  g.command_growth,
            spd_growth:   g.speed_growth,
            pol_growth:   g.politics_growth,
            cha_growth:   g.charisma_growth,
          }),
        });
        if (!res.ok) throw new Error(await res.text());
        g.dirty = false;
        g.editing = false;
        const cached = this.generalsData.find(d => d.id === g.db_id);
        if (cached) {
          cached.strength     = g.force_base;
          cached.intelligence = g.intel_base;
          cached.leadership   = g.command_base;
          cached.speed        = g.speed_base;
          cached.politics     = g.politics_base;
          cached.charisma     = g.charisma_base;
          cached.str_growth   = g.force_growth;
          cached.int_growth   = g.intel_growth;
          cached.lead_growth  = g.command_growth;
          cached.spd_growth   = g.speed_growth;
          cached.pol_growth   = g.politics_growth;
          cached.cha_growth   = g.charisma_growth;
        }
      } catch(e) {
        alert('保存失败：' + e.message);
      }
    },

    filteredAdvisors(team) {
      const q = this.advisorSearch[team].trim().toLowerCase();
      if (!q) return this.advisorSkills;
      return this.advisorSkills.filter(s =>
        s.general_name.includes(q) || s.skill_name.includes(q)
      );
    },

    buildPayload(runs) {
      const clean = (g) => ({
        name: g.name || '无名武将',
        force:   g.force,
        intel:   g.intel,
        command: g.command,
        speed:   g.speed,
        troops: g.troops, troop_type: g.troop_type, troop_grade: g.troop_grade,
        skills: g.skills.map(s => ({
          name: s.name || '无名战法',
          skill_type: s.skill_type,
          activation_rate: s.activation_rate,
          damage_rate: s.damage_rate,
          damage_type: s.damage_type,
          target_mode: s.target_mode,
          heal_rate: s.heal_rate,
          heal_target: s.heal_target,
          apply_status: s.apply_status || null,
        })),
      });
      return {
        team_a: this.teams.a.map(clean),
        team_b: this.teams.b.map(clean),
        tech_a: this.tech.a,
        tech_b: this.tech.b,
        runs,
      };
    },

    async simulate(runs) {
      if (this.loading) return;
      this.loading = true;
      this.runs = runs;
      this.error = null;
      this.result = null;
      this.showLog = false;
      const timeout = setTimeout(() => { this.loading = false; this.error = '模拟超时，请重试'; }, 30000);
      try {
        const res = await fetch('/api/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.buildPayload(runs)),
        });
        if (!res.ok) {
          const msg = await res.text();
          throw new Error(`HTTP ${res.status}: ${msg}`);
        }
        this.result = await res.json();
      } catch (e) {
        this.error = '模拟失败：' + e.message;
      } finally {
        clearTimeout(timeout);
        this.loading = false;
      }
    },

    engagements(log) {
      return [...new Set(log.map(e => e.engagement))].sort((a,b) => a-b);
    },
    logForEngagement(log, eng) {
      return log.filter(e => e.engagement === eng).map((e, i) => ({ ...e, _idx: i }));
    },
    fmtVal(e) {
      if (!e.value && e.value !== 0) return '';
      if (e.value === 0) return '';
      return e.value.toLocaleString();
    },
    valClass(e) {
      if (!e.value || e.value === 0) return '';
      const a = e.action || '';
      if (a.includes('治疗') || a.includes('吸血')) return 'heal';
      if (e.value > 0) return 'dmg';
      return '';
    },
  };
}
</script>
