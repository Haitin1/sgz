name: 自动部署

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 132.145.24.63
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/sgz
            git pull origin main
            sudo systemctl restart sgz-sim.service
            echo "部署完成 $(date)"
